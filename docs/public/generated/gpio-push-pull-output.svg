<svg width="990" height="689" viewBox="0 0 990 689" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GPIO push-pull output diagram</title>
  <desc id="desc">ESP32 GPIO push-pull output: writing 1 drives the pin high and lights an active-high LED, writing 0 drives the pin low and turns the LED off.</desc>
  <defs>
    <style>
      .bg{fill:#fff}
      .ink{fill:#1f2937}
      .muted{fill:#7b8496}
      .blue{stroke:#2563eb}
      .blueFill{fill:#2563eb}
      .teal{stroke:#0ea5a3}
      .tealFill{fill:#0ea5a3}
      .green{stroke:#14a36f}
      .greenFill{fill:#14a36f}
      .red{fill:#e7352c}
      .orange{fill:#f97316}
      .gray{stroke:#c7ced8}
      .grayFill{fill:#c7ced8}
      .panel{fill:#f8fbff;stroke:#9ab8ff;stroke-width:2;stroke-dasharray:6 6}
      .wire{fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .thin{fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
      .label{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:22px;font-weight:700;fill:#1f2937}
      .small{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:17px;fill:#4b5563}
      .tiny{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;font-size:15px;fill:#5b6474}
    </style>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L10 5 L0 10 Z" class="tealFill"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L10 5 L0 10 Z" class="blueFill"/>
    </marker>
  </defs>

  <rect class="bg" width="990" height="689"/>
  <text x="50" y="48" class="label">ESP32 GPIO 推挽输出</text>
  <text x="50" y="76" class="small">推挽输出直接把引脚驱动到高电平或低电平；外部 LED 采用高电平点亮接法。</text>

  <line x1="42" y1="342" x2="948" y2="342" stroke="#d7dce5" stroke-width="2" stroke-dasharray="2 6"/>

  <!-- Row titles -->
  <circle cx="58" cy="91" r="11" fill="#22c55e"/>
  <text x="80" y="98" class="label">写 1：GPIO HIGH，LED 亮</text>
  <circle cx="58" cy="386" r="11" fill="#ef4444"/>
  <text x="80" y="393" class="label">写 0：GPIO LOW，LED 灭</text>

  <!-- Top chip -->
  <g transform="translate(50 178)">
    <rect x="0" y="0" width="118" height="92" rx="12" fill="#fff" stroke="#6b7280" stroke-width="2"/>
    <g stroke="#6b7280" stroke-width="2" stroke-linecap="round">
      <path d="M18 -12 V0M34 -12 V0M50 -12 V0M66 -12 V0M82 -12 V0M98 -12 V0"/>
      <path d="M18 92 V104M34 92 V104M50 92 V104M66 92 V104M82 92 V104M98 92 V104"/>
      <path d="M-12 18 H0M-12 34 H0M-12 50 H0M-12 66 H0"/>
      <path d="M118 18 H130M118 46 H144M118 74 H130"/>
    </g>
    <g transform="translate(31 17) scale(2.7)">
      <path class="red" d="m11.31 16.91a6.65 6.65 0 0 0-2.61-5.91 6.51 6.51 0 0 0-3.35-1.36 0.61 0.61 0 0 1-0.53-0.64 0.59 0.59 0 0 1 0.65-0.54 7.85 7.85 0 0 1 7 8.58 6.85 6.85 0 0 1-0.26 1.35l1.74 0.49a9.66 9.66 0 0 0 1.5-0.57 10.64 10.64 0 0 0 0.19-2.05 11 11 0 0 0-9.33-10.86 4.84 4.84 0 0 0-1.75 0 3.81 3.81 0 0 0-1.89 1.17 3.74 3.74 0 0 0 1.67 6 8.66 8.66 0 0 0 0.94 0.17 3.51 3.51 0 0 1 2.92 3.46 3.47 3.47 0 0 1-0.56 1.89l1.2 0.77a8.91 8.91 0 0 0 1.8 0.3 6.58 6.58 0 0 0 0.66-2.3m0.14 4.14a11.44 11.44 0 0 1-11.44-11.39 11.36 11.36 0 0 1 3.35-8.09l0.65 0.61a10.56 10.56 0 0 0 0 15 10.56 10.56 0 0 0 15 0l0.61 0.61a11.35 11.35 0 0 1-8.17 3.26m9.56-11.38a9.62 9.62 0 0 0-9.67-9.62c-0.34 0-0.67 0-1 0.05l-0.22 0.64a16.55 16.55 0 0 1 10.14 10.13l0.64-0.23c0-0.32 0.06-0.64 0.06-1m-1.11 4.5199a15.34 15.34 0 0 0-13-13 9.73 9.73 0 0 0-2.15 1.55v1.43a12.18 12.18 0 0 1 12.17 12.16h1.43a10.25 10.25 0 0 0 1.55-2.14m-12.91 1.54a1.48 1.48 0 1 1-1.48-1.48 1.48 1.48 0 0 1 1.48 1.48"/>
    </g>
    <text x="30" y="122" class="tiny">ESP32 芯片</text>
  </g>

  <!-- Bottom chip -->
  <g transform="translate(50 472)">
    <rect x="0" y="0" width="118" height="92" rx="12" fill="#fff" stroke="#6b7280" stroke-width="2"/>
    <g stroke="#6b7280" stroke-width="2" stroke-linecap="round">
      <path d="M18 -12 V0M34 -12 V0M50 -12 V0M66 -12 V0M82 -12 V0M98 -12 V0"/>
      <path d="M18 92 V104M34 92 V104M50 92 V104M66 92 V104M82 92 V104M98 92 V104"/>
      <path d="M-12 18 H0M-12 34 H0M-12 50 H0M-12 66 H0"/>
      <path d="M118 18 H130M118 46 H144M118 74 H130"/>
    </g>
    <g transform="translate(31 17) scale(2.7)">
      <path class="red" d="m11.31 16.91a6.65 6.65 0 0 0-2.61-5.91 6.51 6.51 0 0 0-3.35-1.36 0.61 0.61 0 0 1-0.53-0.64 0.59 0.59 0 0 1 0.65-0.54 7.85 7.85 0 0 1 7 8.58 6.85 6.85 0 0 1-0.26 1.35l1.74 0.49a9.66 9.66 0 0 0 1.5-0.57 10.64 10.64 0 0 0 0.19-2.05 11 11 0 0 0-9.33-10.86 4.84 4.84 0 0 0-1.75 0 3.81 3.81 0 0 0-1.89 1.17 3.74 3.74 0 0 0 1.67 6 8.66 8.66 0 0 0 0.94 0.17 3.51 3.51 0 0 1 2.92 3.46 3.47 3.47 0 0 1-0.56 1.89l1.2 0.77a8.91 8.91 0 0 0 1.8 0.3 6.58 6.58 0 0 0 0.66-2.3m0.14 4.14a11.44 11.44 0 0 1-11.44-11.39 11.36 11.36 0 0 1 3.35-8.09l0.65 0.61a10.56 10.56 0 0 0 0 15 10.56 10.56 0 0 0 15 0l0.61 0.61a11.35 11.35 0 0 1-8.17 3.26m9.56-11.38a9.62 9.62 0 0 0-9.67-9.62c-0.34 0-0.67 0-1 0.05l-0.22 0.64a16.55 16.55 0 0 1 10.14 10.13l0.64-0.23c0-0.32 0.06-0.64 0.06-1m-1.11 4.5199a15.34 15.34 0 0 0-13-13 9.73 9.73 0 0 0-2.15 1.55v1.43a12.18 12.18 0 0 1 12.17 12.16h1.43a10.25 10.25 0 0 0 1.55-2.14m-12.91 1.54a1.48 1.48 0 1 1-1.48-1.48 1.48 1.48 0 0 1 1.48 1.48"/>
    </g>
    <text x="30" y="122" class="tiny">ESP32 芯片</text>
  </g>

  <!-- Top wiring and driver -->
  <g>
    <circle cx="194" cy="224" r="9" fill="#fff" class="blue" stroke-width="3"/>
    <path class="wire blue" d="M194 224 H226"/>
    <rect x="226" y="110" width="190" height="208" rx="8" class="panel"/>
    <text x="252" y="139" class="small">内部推挽驱动</text>
    <path class="wire gray" d="M302 157 V197"/>
    <circle cx="302" cy="157" r="7" fill="#fff" class="gray" stroke-width="2"/>
    <text x="318" y="162" class="tiny">3.3 V</text>
    <path class="wire gray" d="M302 282 V300"/>
    <path class="thin gray" d="M286 300 H318M291 307 H313M296 314 H308"/>
    <text x="319" y="303" class="tiny">GND</text>
    <path class="wire blue" d="M226 224 H270"/>
    <circle cx="270" cy="224" r="5" class="blueFill"/>
    <path class="wire blue" d="M302 197 V224 H416"/>
    <circle cx="416" cy="224" r="5" class="blueFill"/>
    <path class="thin green" d="M302 157 C302 176 293 186 278 193"/>
    <path class="thin green" d="M278 193 H302"/>
    <text x="246" y="186" class="tiny greenFill">上管导通</text>
    <path class="thin gray" d="M278 252 H302M302 252 C289 258 282 267 282 282"/>
    <text x="246" y="269" class="tiny muted">下管关断</text>
    <path class="wire teal" d="M302 160 V197 H416" marker-end="url(#arrowTeal)"/>
    <text x="342" y="183" class="tiny tealFill">电流流出</text>
  </g>

  <!-- Top external LED circuit -->
  <g>
    <path class="wire blue" d="M416 224 H465"/>
    <path class="thin blue" d="M465 224 l10 -16 l18 32 l18 -32 l18 32 l18 -32 l10 16"/>
    <path class="wire blue" d="M557 224 H600"/>
    <path class="thin blue" d="M600 203 L600 245 L636 224 Z"/>
    <path class="thin blue" d="M640 202 V246"/>
    <path class="wire blue" d="M640 224 H678 V284"/>
    <path class="thin blue" d="M658 284 H698M664 292 H692M670 300 H686"/>
    <path class="thin teal" d="M612 190 L624 176M627 194 L641 178"/>
    <path class="wire teal" d="M426 205 H589" marker-end="url(#arrowTeal)"/>
    <path class="wire teal" d="M670 210 V274" marker-end="url(#arrowTeal)"/>
    <text x="462" y="260" class="tiny">限流电阻</text>
    <text x="597" y="260" class="tiny">LED 亮</text>
    <text x="690" y="258" class="tiny">GND</text>
  </g>

  <!-- Top summary -->
  <g transform="translate(733 156)">
    <rect x="0" y="0" width="194" height="136" rx="8" fill="#f4fbf8" stroke="#a9dec7"/>
    <text x="22" y="35" class="small">寄存器写入</text>
    <text x="22" y="72" class="label">1 -> HIGH</text>
    <text x="22" y="106" class="small">引脚主动输出 3.3 V</text>
  </g>

  <!-- Bottom wiring and driver -->
  <g>
    <circle cx="194" cy="518" r="9" fill="#fff" class="blue" stroke-width="3"/>
    <path class="wire blue" d="M194 518 H226"/>
    <rect x="226" y="404" width="190" height="208" rx="8" class="panel"/>
    <text x="252" y="433" class="small">内部推挽驱动</text>
    <path class="wire gray" d="M302 451 V469"/>
    <circle cx="302" cy="451" r="7" fill="#fff" class="gray" stroke-width="2"/>
    <text x="318" y="456" class="tiny">3.3 V</text>
    <path class="wire gray" d="M302 576 V594"/>
    <path class="thin gray" d="M286 594 H318M291 601 H313M296 608 H308"/>
    <text x="319" y="597" class="tiny">GND</text>
    <path class="wire blue" d="M226 518 H270"/>
    <circle cx="270" cy="518" r="5" class="blueFill"/>
    <path class="wire blue" d="M302 518 H416"/>
    <circle cx="416" cy="518" r="5" class="blueFill"/>
    <path class="thin gray" d="M278 487 H302M302 487 C289 481 282 472 282 457"/>
    <text x="246" y="480" class="tiny muted">上管关断</text>
    <path class="thin green" d="M278 546 H302M302 546 C302 564 293 574 278 581"/>
    <text x="246" y="565" class="tiny greenFill">下管导通</text>
    <path class="wire teal" d="M416 518 H302 V587" marker-end="url(#arrowTeal)"/>
    <text x="336" y="552" class="tiny tealFill">引脚被拉低</text>
  </g>

  <!-- Bottom external LED circuit -->
  <g>
    <path class="wire blue" d="M416 518 H465"/>
    <path class="thin blue" d="M465 518 l10 -16 l18 32 l18 -32 l18 32 l18 -32 l10 16"/>
    <path class="wire blue" d="M557 518 H600"/>
    <path class="thin blue" d="M600 497 L600 539 L636 518 Z"/>
    <path class="thin blue" d="M640 496 V540"/>
    <path class="wire blue" d="M640 518 H678 V578"/>
    <path class="thin blue" d="M658 578 H698M664 586 H692M670 594 H686"/>
    <path class="thin gray" d="M585 488 L650 548M650 488 L585 548"/>
    <text x="462" y="554" class="tiny">限流电阻</text>
    <text x="594" y="554" class="tiny">LED 灭</text>
    <text x="690" y="552" class="tiny">GND</text>
    <text x="434" y="494" class="tiny muted">两端没有正向压差，无电流</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(733 450)">
    <rect x="0" y="0" width="194" height="136" rx="8" fill="#fff7f2" stroke="#fed7aa"/>
    <text x="22" y="35" class="small">寄存器写入</text>
    <text x="22" y="72" class="label">0 -> LOW</text>
    <text x="22" y="106" class="small">引脚主动接近 GND</text>
  </g>
</svg>
