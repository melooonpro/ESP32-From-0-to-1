name: Deploy documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'examples/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_enabled: ${{ steps.pages.outputs.enabled }}
      site_base: ${{ steps.pages.outputs.site_base }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect GitHub Pages
        id: pages
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          response=$(mktemp)
          status=$(curl -L -s -o "$response" -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/pages")
          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            custom_domain=$(node -e "const fs = require('fs'); const pages = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); console.log(pages.cname || '')" "$response")
            if [ -n "$custom_domain" ]; then
              echo "site_base=/" >> "$GITHUB_OUTPUT"
            else
              echo "site_base=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "site_base=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is not enabled yet. Enable Settings > Pages > Source: GitHub Actions to deploy."
          fi

      - name: Configure GitHub Pages
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/configure-pages@v6

      - name: Build VitePress site
        run: npm run docs:build
        env:
          VITEPRESS_BASE: ${{ steps.pages.outputs.site_base }}

      - name: Upload Pages artifact
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    if: needs.build.outputs.pages_enabled == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
